    <template id="about-template">
      <article class="about">
        <header class="about__head">
          <h1 class="about__title t-display" id="about-title">About</h1>
        </header>

        <div class="about__intro">
          <figure class="about__portrait">
            <img
              src="/images/jesse-ochapo-portrait.jpg"
              alt="Portrait of Jesse O'Chapo"
              width="560"
              height="700"
              loading="lazy"
            />
          </figure>
          <div class="about__copy">
            <p class="about__lede">
              Hello! I'm Jesse O'Chapo, a Principal Product Designer at Meta, based in Santa Cruz, CA. Previously, I
              designed at Life360, Fanpics, and MTV.
            </p>
            <p>
              I built my first website in 1998 to host my Starcraft maps (twinkling star GIF background and all). That
              turned into a career that started in 2006, ran through early-stage startups, and landed me at Meta in 2017.
            </p>
            <p>
              During my 9+ years at Meta I've grown from Product Designer to Senior, Staff, and now Principal. I
              specialize in turning ambiguous zero-to-one initiatives into clear product direction. As a leader, I shape
              work, set the bar for craft, mentor designers, and partner closely with PM and engineering leads to define
              vision where no blueprint exists. I'm an exceptional systems thinker and I'm regularly sought out to frame
              complex team strategies that VPs and Directors can rally behind.
            </p>
            <p>
              While I focus on product strategy and design leadership, I stay hands-on in high-fidelity design. Right now
              that means integrating AI into my daily workflow as a creative thought partner for research, synthesis,
              prototyping, and creating visual content that brings mocks to life. I love experimenting with new
              technology, and I'm usually the person bringing new AI workflows to my peers.
            </p>
          </div>
        </div>

        <section class="about__philosophy" aria-labelledby="how-i-work">
          <h2 class="about__section-title t-display" id="how-i-work">How I work</h2>
          <ul class="about__cards">
            <li class="about__card">
              <h3 class="about__card-title">Systems thinker.</h3>
              <p class="about__card-body">
                My happy place is ambiguous problems that require orchestrating across multiple teams.
              </p>
            </li>
            <li class="about__card">
              <h3 class="about__card-title">Full stack designer.</h3>
              <p class="about__card-body">
                My days range from developing product strategy to sweating visual polish.
              </p>
            </li>
            <li class="about__card">
              <h3 class="about__card-title">Mentor.</h3>
              <p class="about__card-body">
                I get a lot of joy from scaling my experiences through mentorship and coaching.
              </p>
            </li>
            <li class="about__card">
              <h3 class="about__card-title">Growth mindset.</h3>
              <p class="about__card-body">
                I cringe at all my old work and enjoy reflecting on how to improve.
              </p>
            </li>
            <li class="about__card">
              <h3 class="about__card-title">Get it done.</h3>
              <p class="about__card-body">
                Not knowing how to do something does not stop me figuring it out and getting it done.
              </p>
            </li>
            <li class="about__card">
              <h3 class="about__card-title">Inclusive process.</h3>
              <p class="about__card-body">
                My best work materializes by sharing, discussing, and seeking new perspectives.
              </p>
            </li>
          </ul>
        </section>

        <div class="about__links">

          <a href="https://github.com/chapolito">GitHub</a>
          <a href="mailto:jesse@chapolito.com">jesse@chapolito.com</a>

    <script>
      (function () {
        var grid = document.getElementById("grid");
        var projects = (window.PROJECTS || []).filter(function (p) {
          return p.id !== "mk-play" && p.id !== "life360-messaging";
        });

        function tileVideoSrc(src) {
          if (!src || !/\.mp4$/i.test(src)) return src;
          return src.replace(/\.mp4$/i, ".tile.mp4");
        }

        projects.forEach(function (p) {
          var tile = document.createElement("article");
          tile.className = "tile";
          tile.dataset.id = p.id;
          tile.dataset.orient = p.orientation || "landscape";
          tile.dataset.fit = (p.tile && p.tile.fit) || "cover";
          tile.tabIndex = 0;
          tile.setAttribute("role", "button");
          tile.setAttribute("aria-label", p.title + ", " + p.product);

          var surface = document.createElement("div");
          surface.className = "tile__surface";

          var media = document.createElement("div");
          media.className = "tile__media";
          var m = p.tile || {};

          if (m.type === "video") {
            var v = document.createElement("video");
            v.src = tileVideoSrc(m.src);
            v.muted = true;
            v.loop = true;
            v.playsInline = true;
            v.setAttribute("playsinline", "");
            v.preload = "metadata";
            v.setAttribute("data-inview", "");
            media.appendChild(v);
          } else if (m.src) {
            var img = document.createElement("img");
            img.src = m.src;
            img.alt = p.title;
            img.loading = "eager";
            media.appendChild(img);
          }

          surface.appendChild(media);
          tile.appendChild(surface);
          tile.appendChild(document.createElement("div")).className = "tile__veil";

          var label = document.createElement("div");
          label.className = "tile__label";
          var prod = document.createElement("p");
          prod.className = "tile__product";
          prod.textContent = p.product;
          var title = document.createElement("h2");
          title.className = "tile__title";
          title.textContent = p.title;
          label.appendChild(prod);
          label.appendChild(title);
          tile.appendChild(label);

          grid.appendChild(tile);
        });

        if (window.initInview) window.initInview(grid);
      })();
    </script>
    <script type="module">
      import { initBentoBulge, getBulgeWhenReady } from "/javascripts/bento-bulge/index.js";
      import { initBentoBulgeOverlays } from "/javascripts/bento-bulge/overlays.js";

      function boot() {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            const bulge = initBentoBulge({
              bento: "#grid",
              projects: "#portfolio",
              cellSelector: ".tile",
              hoverClass: "is-bulge-hovered",
              cornerRadius: 8
            });

            initBentoBulgeOverlays({
              whenBulgeReady: getBulgeWhenReady(),
              onOpen() {
                bulge?.setOverlayOpen?.(true);
              },
              onClose() {
                bulge?.setOverlayOpen?.(false);
              }
            });
          });
        });
      }

      boot();
    </script>
