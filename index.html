        <script>
          document.addEventListener('DOMContentLoaded', function () {
            var root = document.querySelector('.experimental-home');
            if (!root) return;
            requestAnimationFrame(function () {
              root.classList.add('is-loaded');
            });
          });
        </script>
        <script>
          (function () {
            if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

            var bento = document.querySelector('.experimental-bento');
            if (!bento) return;

            var cells = bento.querySelectorAll('.bento-cell');
            var activeCell = null;

            function distanceToRect(x, y, rect) {
              var dx = Math.max(rect.left - x, 0, x - rect.right);
              var dy = Math.max(rect.top - y, 0, y - rect.bottom);
              return dx * dx + dy * dy;
            }

            function cellAtPoint(x, y) {
              var nearest = null;
              var nearestDist = Infinity;

              for (var i = 0; i < cells.length; i++) {
                var rect = cells[i].getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                  return cells[i];
                }
                var dist = distanceToRect(x, y, rect);
                if (dist < nearestDist) {
                  nearestDist = dist;
                  nearest = cells[i];
                }
              }
              return nearest;
            }

            function setHovered(cell) {
              if (cell === activeCell) return;
              if (activeCell) activeCell.classList.remove('is-hovered');
              activeCell = cell;
              if (activeCell) activeCell.classList.add('is-hovered');
            }

            function clearHovered() {
              setHovered(null);
            }

            document.addEventListener('pointermove', function (e) {
              setHovered(cellAtPoint(e.clientX, e.clientY));
            }, { passive: true });

            document.documentElement.addEventListener('mouseleave', clearHovered);
          })();
        </script>
