    <script>
      (function () {
        var grid = document.getElementById("grid");
        var projects = (window.PROJECTS || []).filter(function (p) {
          return p.id !== "mk-play" && p.id !== "life360-messaging";
        });

        function tileVideoSrc(src) {
          if (!src || !/\.mp4$/i.test(src)) return src;
          if (/\.tile\.mp4$/i.test(src)) return src;
          return src.replace(/\.mp4$/i, ".tile.mp4");
        }

        projects.forEach(function (p) {
          var tile = document.createElement("article");
          tile.className = "tile";
          tile.dataset.id = p.id;
          tile.dataset.orient = p.orientation || "landscape";
          tile.dataset.fit = (p.tile && p.tile.fit) || "cover";
          if (p.tile && (p.tile.align || p.tile.coverAlign)) {
            tile.dataset.coverAlign = p.tile.align || p.tile.coverAlign;
          }
          if (p.tile && p.tile.insetShadow) {
            tile.dataset.insetShadow = "true";
          }
          tile.tabIndex = 0;
          tile.setAttribute("role", "button");
          tile.setAttribute("aria-label", p.title + ", " + p.product);

          var surface = document.createElement("div");
          surface.className = "tile__surface";

          var media = document.createElement("div");
          media.className = "tile__media";
          var m = p.tile || {};

          if (m.type === "video") {
            var v = document.createElement("video");
            v.src = tileVideoSrc(m.src);
            v.muted = true;
            v.loop = true;
            v.playsInline = true;
            v.setAttribute("playsinline", "");
            v.preload = "metadata";
            v.setAttribute("data-inview", "");
            media.appendChild(v);
          } else if (m.src) {
            var img = document.createElement("img");
            img.src = m.src;
            img.alt = p.title;
            img.loading = "eager";
            media.appendChild(img);
          }

          surface.appendChild(media);
          tile.appendChild(surface);
          tile.appendChild(document.createElement("div")).className = "tile__veil";

          var label = document.createElement("div");
          label.className = "tile__label";
          var prod = document.createElement("p");
          prod.className = "tile__product";
          prod.textContent = p.product;
          var title = document.createElement("h2");
          title.className = "tile__title";
          title.textContent = p.title;
          label.appendChild(prod);
          label.appendChild(title);
          tile.appendChild(label);

          grid.appendChild(tile);
        });

        if (window.initInview) window.initInview(grid);
      })();
    </script>
    <script type="module">
      import { initBentoBulge, getBulgeWhenReady } from "/javascripts/bento-bulge/index.js";
      import { initBentoBulgeOverlays } from "/javascripts/bento-bulge/overlays.js";

      function boot() {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            const bulge = initBentoBulge({
              bento: "#grid",
              projects: "#portfolio",
              cellSelector: ".tile",
              hoverClass: "is-bulge-hovered",
              cornerRadius: 8
            });

            initBentoBulgeOverlays({
              whenBulgeReady: getBulgeWhenReady(),
              onOpen(instant) {
                bulge?.setOverlayOpen?.(true, { instant });
              },
              onClose() {
                bulge?.setOverlayOpen?.(false);
              }
            });
          });
        });
      }

      boot();
    </script>
